<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#07080a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Loup Garou</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/views.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>

  <!-- Stars overlay (visible during night phases) -->
  <div id="stars-layer" class="stars-layer"></div>

  <!-- ══════════════════════════════════════
       APP SHELL
       ══════════════════════════════════════ -->
  <div id="app">

    <!-- Header -->
    <header id="app-header">
      <div class="app-logo">
        <span class="logo-moon">🌕</span>
        <span id="app-title">Loup Garou</span>
      </div>

      <div class="flex items-center gap-4">
        <!-- Round / Alive count -->
        <div id="header-stats" class="status-bar">
          <div class="status-item status-item--village">
            <div class="status-dot"></div>
            <span id="header-alive" class="status-alive"></span>
          </div>
          <div class="status-divider"></div>
          <div class="status-round">
            <span id="header-round"></span>
          </div>
        </div>

        <!-- WebSocket status -->
        <div class="ws-status" id="ws-status">
          <div class="ws-dot"></div>
          <span id="ws-label">—</span>
        </div>
      </div>
    </header>

    <!-- ══════════════════════════════════════
         VIEW CONTAINER
         ══════════════════════════════════════ -->
    <div id="view-container">

      <!-- ── SETUP ── -->
      <div id="view-setup" class="view"></div>

      <!-- ── REVEAL ── -->
      <div id="view-reveal" class="view view--reveal"></div>

      <!-- ── NIGHT ── -->
      <div id="view-night" class="view"></div>

      <!-- ── DAY ── -->
      <div id="view-day" class="view"></div>

      <!-- ── VOTE ── -->
      <div id="view-vote" class="view"></div>

      <!-- ── GAME OVER ── -->
      <div id="view-end" class="view view--end"></div>

    </div><!-- /view-container -->

    <!-- Phase Label -->
    <div id="phase-label" class="phase-label" data-i18n="phase.setup">Configuration</div>

    <!-- Debug Panel -->
    <details class="debug-panel" id="debug-panel">
      <summary class="debug-panel__summary">
        <span class="debug-panel__icon">⚙</span>
        <span data-i18n="debug.title">Panneau de test</span>
      </summary>
      <div class="debug-section">
        <h4 class="debug-section__title" data-i18n="debug.navigation">Navigation</h4>
        <div class="debug-buttons">
          <button class="btn-debug btn-debug--danger" id="debug-reset">Reset</button>
          <button class="btn-debug" id="debug-next-phase">Phase suivante</button>
          <button class="btn-debug btn-debug--success" id="debug-begin-vote">Commencer vote</button>
          <button class="btn-debug" id="debug-resolve-votes">Résoudre votes</button>
        </div>
      </div>
      <div class="debug-section">
        <h4 class="debug-section__title" data-i18n="debug.elimination">Élimination</h4>
        <div class="debug-buttons" id="debug-elim-buttons"></div>
      </div>
      <div class="debug-section">
        <h4 class="debug-section__title" data-i18n="debug.night_action">Action nuit</h4>
        <div class="debug-buttons" id="debug-wolf-buttons"></div>
        <div class="debug-buttons" id="debug-seer-buttons"></div>
      </div>
      <div class="debug-section">
        <h4 class="debug-section__title" data-i18n="debug.log">Log</h4>
        <div id="log-area" class="log-area"></div>
      </div>
    </details>

  </div><!-- /app -->

  <!-- Phase Overlay (fullscreen transition) -->
  <div id="phase-overlay" class="phase-overlay hidden">
    <span class="phase-overlay__text"></span>
  </div>

  <!-- Error Message Toast -->
  <div id="error-message" class="error-message hidden"></div>

  <!-- Toast container (injected by utils) -->

  <!-- ══════════════════════════════════════
       JAVASCRIPT — load order matters
       ══════════════════════════════════════ -->

  <!-- 1. i18n (no deps) -->
  <script src="js/i18n.js"></script>

  <!-- 2. Utils (no deps) -->
  <script src="js/utils.js"></script>

  <!-- 3. Components -->
  <script src="js/components/player-grid.js"></script>

  <!-- 4. Views (depend on i18n + utils) -->
  <script src="js/views/view-setup.js"></script>
  <script src="js/views/view-reveal.js"></script>
  <script src="js/views/view-night.js"></script>
  <script src="js/views/view-day.js"></script>
  <script src="js/views/view-vote.js"></script>
  <script src="js/views/view-end.js"></script>

  <!-- 5. Core (orchestrator — boots on DOMContentLoaded) -->
  <script src="js/core.js"></script>

  <!-- 6. Inline: stars + header stats visibility -->
  <script>
    // Create stars for night effect
    const starsLayer = document.getElementById('stars-layer');
    if (starsLayer) LoupGarouUtils.createStars(starsLayer, 70);

    // Show/hide header stats based on phase
    (function() {
      const origApply = LoupGarouCore ? null : null; // hook in after core loads
      // Observer pattern: watch #header-round for changes
      const statsEl = document.getElementById('header-stats');
      const observer = new MutationObserver(() => {
        const roundEl = document.getElementById('header-round');
        if (statsEl && roundEl && roundEl.textContent) {
          statsEl.style.display = 'flex';
        }
      });
      const roundEl = document.getElementById('header-round');
      if (roundEl) observer.observe(roundEl, { childList: true, characterData: true, subtree: true });
    })();
  </script>

</body>
</html>
