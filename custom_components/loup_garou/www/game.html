<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#07080a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Loup Garou</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/views.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>

  <!-- Stars overlay (visible during night phases) -->
  <div id="stars-layer" class="stars-layer"></div>

  <!-- ══════════════════════════════════════
       APP SHELL
       ══════════════════════════════════════ -->
  <div id="app">

    <!-- Header -->
    <header id="app-header">
      <div class="app-logo">
        <span class="logo-moon">🌕</span>
        <span id="app-title">Loup Garou</span>
      </div>

      <div class="flex items-center gap-4">
        <!-- Round / Alive count -->
        <div id="header-stats" class="status-bar">
          <div class="status-item status-item--village">
            <div class="status-dot"></div>
            <span id="header-alive" class="status-alive"></span>
          </div>
          <div class="status-divider"></div>
          <div class="status-round">
            <span id="header-round"></span>
          </div>
        </div>

        <!-- WebSocket status -->
        <div class="ws-status" id="ws-status">
          <div class="ws-dot"></div>
          <span id="ws-label">—</span>
        </div>
      </div>
    </header>

    <!-- ══════════════════════════════════════
         VIEW CONTAINER
         ══════════════════════════════════════ -->
    <div id="view-container">

      <!-- ── SETUP ── -->
      <div id="view-setup" class="view"></div>

      <!-- ── REVEAL ── -->
      <div id="view-reveal" class="view view--reveal"></div>

      <!-- ── NIGHT ── -->
      <div id="view-night" class="view"></div>

      <!-- ── DAY ── -->
      <div id="view-day" class="view"></div>

      <!-- ── VOTE ── -->
      <div id="view-vote" class="view"></div>

      <!-- ── GAME OVER ── -->
      <div id="view-end" class="view view--end"></div>

    </div><!-- /view-container -->

    <!-- Phase Label -->
    <div id="phase-label" class="phase-label" data-i18n="phase.setup">Configuration</div>

    <!-- Debug Panel -->
    <details class="debug-panel" id="debug-panel">
      <summary class="debug-panel__summary">
        <span class="debug-panel__icon">⚙</span>
        <span data-i18n="debug.title">Panneau de test</span>
      </summary>
      <div class="debug-section">
        <h4 class="debug-section__title" data-i18n="debug.navigation">Navigation</h4>
        <div class="debug-buttons">
          <button class="btn-debug btn-debug--danger" id="debug-reset">Reset</button>
          <button class="btn-debug" id="debug-next-phase">Phase suivante</button>
          <button class="btn-debug btn-debug--success" id="debug-begin-vote">Commencer vote</button>
          <button class="btn-debug" id="debug-resolve-votes">Résoudre votes</button>
        </div>
      </div>
      <div class="debug-section">
        <h4 class="debug-section__title" data-i18n="debug.elimination">Élimination</h4>
        <div class="debug-buttons" id="debug-elim-buttons"></div>
      </div>
      <div class="debug-section">
        <h4 class="debug-section__title" data-i18n="debug.night_action">Action nuit</h4>
        <div class="debug-buttons" id="debug-wolf-buttons"></div>
        <div class="debug-buttons" id="debug-seer-buttons"></div>
      </div>
      <div class="debug-section">
        <h4 class="debug-section__title" data-i18n="debug.log">Log</h4>
        <div id="log-area" class="log-area"></div>
      </div>
    </details>

  </div><!-- /app -->

  <!-- Phase Overlay (fullscreen transition) -->
  <div id="phase-overlay" class="phase-overlay hidden">
    <span class="phase-overlay__text"></span>
  </div>

  <!-- Error Message Toast -->
  <div id="error-message" class="error-message hidden"></div>

  <!-- Toast container (injected by utils) -->

  <!-- ══════════════════════════════════════
       JAVASCRIPT — load order matters
       ══════════════════════════════════════ -->

  <!-- 1. i18n (no deps) -->
  <script src="js/i18n.js"></script>

  <!-- 2. Utils (no deps) -->
  <script src="js/utils.js"></script>

  <!-- 3. Components -->
  <script src="js/components/player-grid.js"></script>

  <!-- 4. Views (depend on i18n + utils) -->
  <script src="js/views/view-setup.js"></script>
  <script src="js/views/view-reveal.js"></script>
  <script src="js/views/view-night.js"></script>
  <script src="js/views/view-day.js"></script>
  <script src="js/views/view-vote.js"></script>
  <script src="js/views/view-end.js"></script>

  <!-- 5. Core (orchestrator — boots on DOMContentLoaded) -->
  <script src="js/core.js"></script>

  <!-- 6. Inline: stars + header stats visibility -->
  <script>
    // Create stars for night effect
    const starsLayer = document.getElementById('stars-layer');
    if (starsLayer) LoupGarouUtils.createStars(starsLayer, 70);

    // Show/hide header stats based on phase
    (function() {
      const origApply = LoupGarouCore ? null : null; // hook in after core loads
      // Observer pattern: watch #header-round for changes
      const statsEl = document.getElementById('header-stats');
      const observer = new MutationObserver(() => {
        const roundEl = document.getElementById('header-round');
        if (statsEl && roundEl && roundEl.textContent) {
          statsEl.classList.add('visible');
        }
      });
      const roundEl = document.getElementById('header-round');
      if (roundEl) observer.observe(roundEl, { childList: true, characterData: true, subtree: true });
    })();
  </script>

  <!-- 7. Debug Panel Setup -->
  <script>
    (function() {
      // Wait for core to be ready
      const checkCore = () => {
        if (typeof LoupGarouCore === 'undefined') {
          setTimeout(checkCore, 50);
          return;
        }
        setupDebugPanel();
      };
      checkCore();

      function setupDebugPanel() {
        const panel = document.getElementById('debug-panel');
        if (!panel) return;

        // Hide panel if not in debug mode
        if (!LoupGarouUtils.isDebugMode()) {
          panel.style.display = 'none';
          return;
        }

        // Open panel by default in debug mode
        panel.open = true;

        // Navigation buttons
        document.getElementById('debug-reset')?.addEventListener('click', () => {
          LoupGarouCore.resetGame();
          logMsg('Game reset', 'info');
        });
        document.getElementById('debug-next-phase')?.addEventListener('click', () => {
          LoupGarouCore.debugNextPhase();
          logMsg('Next phase', 'info');
        });
        document.getElementById('debug-begin-vote')?.addEventListener('click', () => {
          LoupGarouCore.debugBeginVote();
          logMsg('Begin vote', 'info');
        });
        document.getElementById('debug-resolve-votes')?.addEventListener('click', () => {
          LoupGarouCore.debugResolveVotes();
          logMsg('Resolve votes', 'info');
        });
      }

      // Update debug buttons based on game state
      window.updateDebugButtons = function(players) {
        if (!players) return;
        const elimDiv = document.getElementById('debug-elim-buttons');
        const wolfDiv = document.getElementById('debug-wolf-buttons');
        const seerDiv = document.getElementById('debug-seer-buttons');
        const alive = players.filter(p => p.alive !== false);

        if (elimDiv) {
          elimDiv.innerHTML = alive.map(p =>
            `<button class="btn-debug btn-debug--danger" data-id="${p.id}">Éliminer ${p.name}</button>`
          ).join('');
          elimDiv.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => LoupGarouCore.debugEliminate(btn.dataset.id));
          });
        }

        if (wolfDiv) {
          wolfDiv.innerHTML = '<span class="debug-label">Loups:</span> ' +
            alive.map(p =>
              `<button class="btn-debug" data-id="${p.id}">Tuer ${p.name}</button>`
            ).join('');
          wolfDiv.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => LoupGarouCore.debugWolfKill(btn.dataset.id));
          });
        }

        if (seerDiv) {
          seerDiv.innerHTML = '<span class="debug-label">Voyante:</span> ' +
            alive.map(p =>
              `<button class="btn-debug" data-id="${p.id}">Observer ${p.name}</button>`
            ).join('');
          seerDiv.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => LoupGarouCore.debugSeerInvestigate(btn.dataset.id));
          });
        }
      };

      // Logging
      window.logMsg = function(msg, type) {
        const area = document.getElementById('log-area');
        if (!area) return;
        const ts = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const div = document.createElement('div');
        div.className = 'log-entry ' + (type || '');
        div.textContent = '[' + ts + '] ' + msg;
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
      };

      // Add debug label style
      const style = document.createElement('style');
      style.textContent = '.debug-label { color: var(--color-ash); font-size: 11px; margin-right: 4px; }';
      document.head.appendChild(style);
    })();
  </script>

</body>
</html>
