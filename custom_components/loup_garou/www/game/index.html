<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Loup Garou</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<canvas id="bg-canvas" style="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0"></canvas>

<!-- ── Status bar ─────────────────────────────────────────────────────────── -->
<div id="status-bar">
  <span id="st-phase">—</span>
  <span id="ws-status" class="disconnected">Déconnecté</span>
</div>

<!-- ── Toast ──────────────────────────────────────────────────────────────── -->
<div id="toast"></div>

<div id="app">

<!-- ══ SETUP ══════════════════════════════════════════════════════════════════ -->
<div id="view-setup" class="view active">
  <a href="/loup_garou/game/launcher.html" class="back-link">← Accueil</a>
  <h1>Loup Garou</h1>
  <h2>Préparation de la partie</h2>

  <section>
    <div class="ruled"><h3>Joueurs</h3></div>
    <div id="setup-player-list" class="player-list"></div>
    <button id="btn-add-player" class="secondary" style="margin-top:0.75rem">+ Ajouter un joueur</button>
  </section>

  <section>
    <div class="ruled">
      <h3>Rôles</h3>
      <span id="role-total-label" style="font-family:var(--font-display);font-size:0.75rem;color:var(--amber);letter-spacing:0.08em">0 / 0</span>
    </div>
    <div id="setup-role-slots" class="role-slots"></div>
  </section>

  <button id="btn-start-game" class="primary" disabled>Commencer la partie</button>
</div>

<!-- ══ ROLE REVEAL ════════════════════════════════════════════════════════════ -->
<div id="view-reveal" class="view">
  <h2 id="reveal-player-label"></h2>

  <div class="reveal-card-wrapper">
    <div class="reveal-card" id="reveal-card">
      <div class="card-face card-front">
        <span class="reveal-tap">Touchez pour révéler votre rôle</span>
      </div>
      <div class="card-face card-back">
        <!-- Populated by reveal.js -->
      </div>
    </div>
  </div>

  <button id="btn-reveal-seen" class="primary" style="display:none"></button>
</div>

<!-- ══ NIGHT ══════════════════════════════════════════════════════════════════ -->
<div id="view-night" class="view">

  <!-- Sleeping -->
  <div id="night-sleeping">
    <div style="display:flex;flex-direction:column;align-items:center;gap:1.5rem;padding:2rem 0 1.5rem">
      <svg viewBox="0 0 400 280" style="width:100%;max-width:380px;display:block;overflow:hidden;border-radius:8px" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="nightSkyBg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0c0820"/>
            <stop offset="100%" stop-color="#060410"/>
          </linearGradient>
          <linearGradient id="duskOverlay" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#c45020"/>
            <stop offset="45%" stop-color="#7a1a8a"/>
            <stop offset="100%" stop-color="#1a0840"/>
          </linearGradient>
          <radialGradient id="moonGrad" cx="38%" cy="35%" r="55%">
            <stop offset="0%" stop-color="#fff9e0"/>
            <stop offset="40%" stop-color="#f0e080"/>
            <stop offset="100%" stop-color="#d0b050"/>
          </radialGradient>
        </defs>

        <!-- Night sky background -->
        <rect width="400" height="280" fill="url(#nightSkyBg)"/>

        <!-- Dusk overlay — fades out to reveal night -->
        <rect width="400" height="280" fill="url(#duskOverlay)" style="animation:duskFade 6s ease-in 0.5s forwards"/>

        <!-- Stars -->
        <circle cx="22"  cy="28"  r="1.0" fill="rgba(215,205,245,1)" opacity="0" style="animation:starAppear 0.7s ease-out 3.2s forwards"/>
        <circle cx="68"  cy="14"  r="1.3" fill="rgba(215,205,245,1)" opacity="0" style="animation:starAppear 0.7s ease-out 3.8s forwards"/>
        <circle cx="105" cy="38"  r="0.9" fill="rgba(215,205,245,1)" opacity="0" style="animation:starAppear 0.7s ease-out 4.5s forwards"/>
        <circle cx="145" cy="18"  r="1.1" fill="rgba(215,205,245,1)" opacity="0" style="animation:starAppear 0.7s ease-out 4.1s forwards"/>
        <circle cx="175" cy="48"  r="0.8" fill="rgba(215,205,245,1)" opacity="0" style="animation:starAppear 0.7s ease-out 5.2s forwards"/>
        <circle cx="210" cy="22"  r="1.4" fill="rgba(215,205,245,1)" opacity="0" style="animation:starAppear 0.7s ease-out 3.5s forwards"/>
        <circle cx="240" cy="55"  r="0.9" fill="rgba(215,205,245,1)" opacity="0" style="animation:starAppear 0.7s ease-out 5.8s forwards"/>
        <circle cx="268" cy="30"  r="1.2" fill="rgba(215,205,245,1)" opacity="0" style="animation:starAppear 0.7s ease-out 4.8s forwards"/>
        <circle cx="52"  cy="62"  r="1.1" fill="rgba(215,205,245,1)" opacity="0" style="animation:starAppear 0.7s ease-out 6.2s forwards"/>
        <circle cx="88"  cy="80"  r="0.8" fill="rgba(215,205,245,1)" opacity="0" style="animation:starAppear 0.7s ease-out 6.8s forwards"/>
        <circle cx="130" cy="70"  r="1.0" fill="rgba(215,205,245,1)" opacity="0" style="animation:starAppear 0.7s ease-out 5.5s forwards"/>
        <circle cx="160" cy="90"  r="0.9" fill="rgba(215,205,245,1)" opacity="0" style="animation:starAppear 0.7s ease-out 7.2s forwards"/>
        <circle cx="195" cy="72"  r="1.3" fill="rgba(215,205,245,1)" opacity="0" style="animation:starAppear 0.7s ease-out 6.5s forwards"/>
        <circle cx="228" cy="88"  r="0.8" fill="rgba(215,205,245,1)" opacity="0" style="animation:starAppear 0.7s ease-out 7.8s forwards"/>
        <circle cx="35"  cy="105" r="1.0" fill="rgba(215,205,245,1)" opacity="0" style="animation:starAppear 0.7s ease-out 7.5s forwards"/>
        <circle cx="78"  cy="118" r="1.2" fill="rgba(215,205,245,1)" opacity="0" style="animation:starAppear 0.7s ease-out 8.2s forwards"/>
        <circle cx="118" cy="110" r="0.9" fill="rgba(215,205,245,1)" opacity="0" style="animation:starAppear 0.7s ease-out 6.0s forwards"/>
        <circle cx="155" cy="128" r="1.1" fill="rgba(215,205,245,1)" opacity="0" style="animation:starAppear 0.7s ease-out 8.8s forwards"/>
        <circle cx="200" cy="115" r="0.8" fill="rgba(215,205,245,1)" opacity="0" style="animation:starAppear 0.7s ease-out 7.0s forwards"/>
        <circle cx="360" cy="42"  r="1.3" fill="rgba(215,205,245,1)" opacity="0" style="animation:starAppear 0.7s ease-out 4.2s forwards"/>

        <!-- Moon — rises from below horizon -->
        <circle cx="310" cy="295" r="22" fill="url(#moonGrad)"
          style="filter:drop-shadow(0 0 8px rgba(200,168,80,0.9)) drop-shadow(0 0 20px rgba(200,168,80,0.4));animation:moonRise 7s ease-out 1.5s forwards"/>

        <!-- Village + forest silhouette -->
        <path d="
          M0,280 L0,218
          L18,218 L18,200 L36,186 L54,200 L54,218
          L62,218 L62,195 L70,195 L70,188 L78,188 L78,195 L86,195 L86,175 L98,162 L110,175 L110,218
          L122,218 L122,205 L134,192 L146,205 L146,218
          L155,205 L165,182 L175,205
          L185,205 L195,185 L205,205
          L215,218 L228,218 L228,200 L240,190 L252,200 L252,218
          L262,205 L272,180 L282,205
          L292,218 L304,218 L304,202 L312,193 L320,202 L320,218
          L332,218 L332,198 L344,185 L356,198 L356,218
          L368,205 L378,185 L388,205
          L400,218 L400,280 Z"
          fill="#08060e"/>
      </svg>
      <div id="sleep-text" style="
        font-family:var(--font-display);font-size:0.85rem;
        color:var(--text-muted);letter-spacing:0.2em;text-transform:uppercase;
        animation:breathe 4s ease-in-out infinite"></div>
    </div>
  </div>

  <!-- Action panel -->
  <div id="night-action" style="display:none">

    <!-- Role artifact (seer orb, cupid note, etc.) -->
    <div id="role-artifact" style="display:none"></div>

    <h2 id="na-role-name"></h2>
    <p id="na-prompt" class="night-prompt"></p>

    <div id="na-victim" class="night-info" style="display:none"></div>

    <!-- Witch potions -->
    <div id="na-witch-potions" class="witch-actions" style="display:none">
      <button id="witch-save-btn" class="witch-toggle-btn secondary">💊 Utiliser la guérison</button>
      <button id="witch-poison-btn" class="witch-toggle-btn secondary">☠️ Utiliser le poison</button>
    </div>

    <div id="na-grid" class="player-grid"></div>

    <div class="action-row">
      <button id="btn-na-skip" class="secondary">Passer</button>
      <button id="btn-na-confirm" class="primary" disabled>Confirmer</button>
    </div>
  </div>

  <!-- Seer result -->
  <div id="night-seer" style="display:none">
    <div style="padding:3rem 0;display:flex;flex-direction:column;align-items:center;gap:2rem">
      <div class="night-result" style="width:100%;max-width:320px">
        <div style="font-family:var(--font-display);font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.75rem">🔮 Voyante</div>
        <div id="seer-name" class="night-result-name"></div>
        <div id="seer-role" class="night-result-role"></div>
      </div>
      <button id="btn-seer-ack" class="primary">J'ai vu</button>
    </div>
  </div>

</div>

<!-- ══ DAY ════════════════════════════════════════════════════════════════════ -->
<div id="view-day" class="view">
  <h1>Jour <span id="day-night-num"></span></h1>

  <div id="day-announcement" class="day-announcement"></div>

  <div id="day-grid" class="player-grid"></div>

  <div class="action-row">
    <button id="btn-day-night" class="secondary">Nuit suivante</button>
    <button id="btn-day-vote" class="danger">Voter</button>
  </div>
</div>

<!-- ══ VOTE ═══════════════════════════════════════════════════════════════════ -->
<div id="view-vote" class="view">
  <h1>Vote</h1>
  <p class="vote-instruction">À qui vote</p>
  <div class="voter-name" id="vote-voter-name"></div>

  <div id="vote-grid" class="player-grid"></div>

  <button id="btn-vote-confirm" class="primary" disabled>Voter</button>
  <div id="vote-progress" style="font-family:var(--font-display);font-size:0.75rem;color:var(--text-muted);text-align:center;letter-spacing:0.1em"></div>
</div>

<!-- ══ GAME OVER ══════════════════════════════════════════════════════════════ -->
<div id="view-game-over" class="view">
  <div id="go-banner" class="winner-banner">
    <div id="go-msg" class="winner-msg"></div>
  </div>

  <div id="go-grid" class="player-grid"></div>

  <button id="btn-restart" class="secondary">Nouvelle partie</button>
</div>

</div><!-- #app -->

<style>
@keyframes duskFade   { to { opacity:0 } }
@keyframes moonRise   { to { transform:translateY(-185px) } }
@keyframes starAppear { from { opacity:0 } to { opacity:1 } }
@keyframes breathe {
  0%,100% { opacity:0.35 }
  50%      { opacity:1 }
}

#ws-status.connected    { color: var(--sage); }
#ws-status.disconnected { color: var(--blood-bright); }

.team-wolf    { color: var(--blood-bright); }
.team-village { color: var(--sage); }
.team-lovers  { color: var(--rose); }

.deaths { border-left-color: var(--blood); }
</style>

<script type="module" src="js/app.js"></script>
<footer id="version-footer" style="position:fixed;bottom:6px;right:10px;font-size:0.65rem;color:#7a6a58;font-family:monospace;pointer-events:none;letter-spacing:0.04em"></footer>
</body>
</html>
