<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Loup Garou — Config</title>
<style>
  :root {
    --bg: #0d0d1a; --surface: #1a1a2e; --accent: #c0392b;
    --gold: #f0c040; --text: #e8e8f0; --muted: #888;
    --radius: 12px; --font: 'Georgia', serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
  h1 { color: var(--gold); font-size: 2rem; margin-bottom: 0.3rem; }
  h2 { color: var(--muted); font-size: 1rem; margin-bottom: 2rem; }
  .card { background: var(--surface); border-radius: var(--radius); padding: 1.5rem; width: 100%; max-width: 500px; margin-bottom: 1rem; }
  .card h3 { color: var(--gold); margin-bottom: 1rem; }
  a.btn {
    display: block; background: var(--accent); color: #fff;
    border-radius: var(--radius); padding: 0.9rem 1.4rem;
    font-size: 1.1rem; text-align: center; text-decoration: none;
    transition: opacity 0.2s; margin-top: 0.5rem;
  }
  a.btn:hover { opacity: 0.85; }
  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  td { padding: 0.4rem 0.6rem; border-bottom: 1px solid #333; }
  td:first-child { color: var(--muted); width: 40%; }
</style>
</head>
<body>
<h1>🐺 Loup Garou</h1>
<h2>Hub de configuration</h2>

<div class="card">
  <h3>Partie</h3>
  <a href="/loup_garou/game/index.html" class="btn">Ouvrir le jeu</a>
</div>

<div class="card">
  <h3>Référence des rôles</h3>
  <div id="role-ref">Chargement…</div>
</div>

<script>
(async () => {
  const r = await fetch('/loup_garou/locales/fr.json');
  const locale = await r.json();
  const roles = ['villager','werewolf','seer','hunter','elder','scapegoat','little_girl','witch','cupid','alpha_wolf','minion','sheriff'];
  const el = document.getElementById('role-ref');
  el.innerHTML = '<table>' + roles.map(id => `
    <tr>
      <td>${locale[`role.${id}.name`] || id}</td>
      <td>${locale[`role.${id}.description`] || ''}</td>
    </tr>`).join('') + '</table>';
})();
</script>
</body>
</html>
