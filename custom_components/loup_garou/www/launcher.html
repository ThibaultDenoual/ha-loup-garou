<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Loup Garou</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --color-bg-primary: #1a1a2e;
            --color-bg-secondary: #16213e;
            --color-accent-primary: #e94560;
            --color-accent-secondary: #0f3460;
            --color-text-primary: #eee;
            --color-text-muted: #8b8b9e;
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-size-xl: 24px;
            --font-size-2xl: 32px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --spacing-2xl: 48px;
            --radius-lg: 12px;
            --radius-xl: 14px;
            --radius-pill: 9999px;
            --transition-fast: 0.15s ease;
            --transition-normal: 0.25s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background: var(--color-bg-primary);
            color: var(--color-text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: var(--spacing-xl);
        }

        .logo {
            font-size: var(--font-size-2xl);
            font-weight: 700;
            margin-bottom: var(--spacing-lg);
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }

        .logo i {
            color: var(--color-accent-primary);
        }

        .message {
            font-size: var(--font-size-xl);
            color: var(--color-text-muted);
            margin-bottom: var(--spacing-xl);
            line-height: 1.5;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: var(--spacing-md) var(--spacing-xl);
            background: var(--color-accent-primary);
            color: white;
            text-decoration: none;
            border-radius: var(--radius-lg);
            font-size: var(--font-size-xl);
            font-weight: 600;
            transition: transform var(--transition-fast), box-shadow var(--transition-fast);
            cursor: pointer;
            border: none;
            letter-spacing: 0.02em;
        }

        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.4);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-icon {
            font-size: var(--font-size-xl);
        }

        .hint {
            margin-top: var(--spacing-lg);
            font-size: var(--font-size-md, 16px);
            color: var(--color-text-muted);
            min-height: 20px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .opening {
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* Debug Panel */
        .debug-panel {
            background: var(--color-bg-secondary);
            border: 1px dashed var(--color-text-muted);
            border-radius: var(--radius-lg);
            padding: var(--spacing-md);
            margin-top: var(--spacing-xl);
            max-width: 400px;
            width: 100%;
            text-align: left;
        }

        .debug-panel summary {
            cursor: pointer;
            color: var(--color-text-muted);
            font-size: var(--font-size-sm, 13px);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .debug-panel summary:hover {
            color: var(--color-text-primary);
        }

        .debug-section {
            margin: var(--spacing-md) 0;
        }

        .debug-section h4 {
            color: var(--color-text-muted);
            font-size: var(--font-size-xs, 11px);
            text-transform: uppercase;
            margin-bottom: var(--spacing-sm);
        }

        .debug-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-sm);
        }

        .btn-debug {
            background: var(--color-bg-primary);
            color: var(--color-text-muted);
            border: 1px solid var(--color-accent-secondary);
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: var(--font-size-xs, 12px);
            transition: all var(--transition-fast);
        }

        .btn-debug:hover {
            background: var(--color-accent-secondary);
            color: var(--color-text-primary);
        }

        .btn-debug.danger {
            border-color: var(--color-accent-primary);
            color: var(--color-accent-primary);
        }

        .btn-debug.danger:hover {
            background: rgba(233, 69, 96, 0.2);
        }

        .log-area {
            background: var(--color-bg-primary);
            border-radius: var(--radius-md);
            padding: var(--spacing-sm);
            font-family: monospace;
            font-size: var(--font-size-xs, 11px);
            max-height: 100px;
            overflow-y: auto;
            color: #7fba7f;
            margin-top: var(--spacing-sm);
        }

        .log-entry {
            margin-bottom: 2px;
        }

        .log-entry.err {
            color: var(--color-accent-primary);
        }

        .log-entry.info {
            color: var(--color-accent-info, #5b9bd5);
        }

        /* Responsive */
        @media (max-width: 480px) {
            body {
                padding: var(--spacing-md);
            }

            .logo {
                font-size: var(--font-size-xl);
            }

            .message {
                font-size: var(--font-size-lg, 18px);
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="logo">
        <i class="fas fa-moon"></i>
        Loup Garou
    </div>
    <p class="message" id="message">Lancez la partie — sans distraction.</p>
    <button class="btn" id="openBtn" onclick="openLoupGarou()">
        <span class="btn-icon"><i class="fas fa-gamepad"></i></span>
        <span>Lancer la partie</span>
    </button>
    <p class="hint" id="hint"></p>

    <details class="debug-panel" id="debug-panel">
        <summary>
            <i class="fas fa-bug"></i>
            Panneau de test
        </summary>
        <div class="debug-section">
            <h4>Actions</h4>
            <div class="debug-buttons">
                <button class="btn-debug" onclick="debugWs('get_state')">get_state</button>
                <button class="btn-debug" onclick="debugWs('reset')">reset</button>
                <button class="btn-debug" onclick="debugWs('next_phase')">next_phase</button>
                <button class="btn-debug" onclick="debugWs('begin_vote')">begin_vote</button>
                <button class="btn-debug" onclick="debugWs('resolve_votes')">resolve_votes</button>
            </div>
        </div>
        <div class="debug-section">
            <h4>Elimination</h4>
            <div class="debug-buttons" id="elim-buttons"></div>
        </div>
        <div class="debug-section">
            <h4>Log</h4>
            <div id="log-area" class="log-area"></div>
        </div>
    </details>

    <script>
        var gameWindow = null;
        var ws = null;
        var lastState = null;

        function initWs() {
            ws = new WebSocket(
                (location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/loup_garou/ws'
            );

            ws.onmessage = function(event) {
                var data = JSON.parse(event.data);
                if (data.type === 'state') {
                    lastState = data.data;
                    updateDebugButtons();
                }
                logMsg(JSON.stringify(data), data.type === 'error' ? 'err' : 'info');
            };

            ws.onopen = function() {
                ws.send(JSON.stringify({ type: 'get_state' }));
            };
        }

        function debugWs(action, data) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: action, ...(data || {}) }));
            }
        }

        function updateDebugButtons() {
            var elimDiv = document.getElementById('elim-buttons');
            if (!lastState || !lastState.players) {
                elimDiv.innerHTML = '';
                return;
            }
            var alive = lastState.players.filter(function(p) { return p.alive !== false; });
            var nonWolf = alive.filter(function(p) { return p.role !== 'werewolf'; });

            elimDiv.innerHTML = '<span style="color:var(--color-text-muted);font-size:11px;">Eliminer:</span> ' +
                alive.map(function(p) {
                    return '<button class="btn-debug danger" onclick="debugWs(\'eliminate_player\', {player_id:\'' + p.id + '\',cause:\'village_vote\'})">' + p.name + '</button>';
                }).join('') +
                '<br><span style="color:var(--color-text-muted);font-size:11px;margin-top:6px;display:inline-block;">Loup:</span> ' +
                nonWolf.map(function(p) {
                    return '<button class="btn-debug" onclick="debugWs(\'night_action\', {action_type:\'wolf_kill\',target_id:\'' + p.id + '\'})">Tuer ' + p.name + '</button>';
                }).join('') +
                '<br><span style="color:var(--color-text-muted);font-size:11px;margin-top:6px;display:inline-block;">Voyante:</span> ' +
                alive.map(function(p) {
                    return '<button class="btn-debug" onclick="debugWs(\'night_action\', {action_type:\'seer_investigate\',target_id:\'' + p.id + '\'})">Observer ' + p.name + '</button>';
                }).join('');
        }

        function logMsg(msg, type) {
            var area = document.getElementById('log-area');
            var ts = new Date().toLocaleTimeString('fr-FR', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            var div = document.createElement('div');
            div.className = 'log-entry ' + (type || '');
            div.textContent = '[' + ts + '] ' + msg;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        }

        initWs();

        function openLoupGarou() {
            var adminUrl = window.location.origin + '/loup_garou/game.html';
            var isWebView = /HomeAssistant|wv|WebView/i.test(navigator.userAgent);

            if (isWebView) {
                window.location.href = adminUrl;
                return;
            }

            if (gameWindow && !gameWindow.closed) {
                gameWindow.focus();
                updateUI('focused');
                return;
            }

            var messageEl = document.getElementById('message');
            messageEl.classList.add('opening');

            gameWindow = window.open(adminUrl, 'loup_garou_game', 'noopener,noresize');

            if (gameWindow) {
                updateUI('opened');
            } else {
                window.location.href = adminUrl;
            }
        }

        function updateUI(state) {
            var messageEl = document.getElementById('message');
            var hintEl = document.getElementById('hint');
            var btnEl = document.getElementById('openBtn');
            messageEl.classList.remove('opening');

            if (state === 'opened') {
                messageEl.textContent = 'La partie est lancee dans un nouvel onglet!';
                hintEl.textContent = 'Cliquez a nouveau pour refocuser la fenetre';
                btnEl.querySelector('span:last-child').textContent = 'Refocuser';
            } else if (state === 'focused') {
                messageEl.textContent = 'Retour a la fenetre de jeu!';
            }
        }
    </script>
</body>
</html>
