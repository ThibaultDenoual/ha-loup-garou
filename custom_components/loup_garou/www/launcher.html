<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loup Garou</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --color-bg-primary: #1a1a2e;
            --color-accent-primary: #e94560;
            --color-accent-secondary: #0f3460;
            --color-text-primary: #eee;
            --color-text-muted: #8b8b9e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--color-bg-primary);
            color: var(--color-text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }

        .logo {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .logo i {
            color: var(--color-accent-primary);
            margin-right: 10px;
        }

        .message {
            font-size: 18px;
            color: var(--color-text-muted);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 18px 40px;
            background: var(--color-accent-primary);
            color: white;
            text-decoration: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            cursor: pointer;
            border: none;
            letter-spacing: 0.02em;
        }

        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.4);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-icon {
            font-size: 22px;
        }

        .hint {
            margin-top: 24px;
            font-size: 14px;
            color: var(--color-text-muted);
            min-height: 20px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .opening {
            animation: pulse 1.5s ease-in-out infinite;
        }

        .debug-panel {
            background: #0d1b2a;
            border: 1px dashed #444;
            border-radius: 10px;
            padding: 16px;
            margin-top: 20px;
            max-width: 400px;
            width: 100%;
            text-align: left;
        }
        .debug-panel summary { cursor: pointer; color: var(--color-text-muted); font-size: 13px; }
        .debug-panel summary:hover { color: var(--color-text-primary); }
        .debug-section { margin: 10px 0; }
        .debug-section h4 { color: var(--color-text-muted); font-size: 11px; text-transform: uppercase; margin-bottom: 8px; }
        .debug-buttons { display: flex; flex-wrap: wrap; gap: 6px; }
        .btn-debug { background: var(--color-bg-primary); color: var(--color-text-muted); border: 1px solid #333; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .btn-debug:hover { background: #2a2a3e; color: var(--color-text-primary); border-color: #555; }
        .btn-debug.danger { border-color: #5c1f2a; color: #e94560; }
        .btn-debug.danger:hover { background: #2a1a24; }
        .log-area { background: #0a0f1a; border-radius: 6px; padding: 10px; font-family: monospace; font-size: 11px; max-height: 120px; overflow-y: auto; color: #7fba7f; margin-top: 10px; }
        .log-entry { margin-bottom: 2px; }
        .log-entry.err { color: #e94560; }
        .log-entry.info { color: #5b9bd5; }
    </style>
</head>
<body>
    <div class="logo">
        <i class="fas fa-paw"></i>Loup Garou
    </div>
    <p class="message" id="message">Lancez la partie — sans distraction.</p>
    <button class="btn" id="openBtn" onclick="openLoupGarou()">
        <span class="btn-icon"><i class="fas fa-paw"></i></span>
        <span>Lancer la partie</span>
    </button>
    <p class="hint" id="hint"></p>

    <details class="debug-panel" id="debug-panel">
        <summary><i class="fas fa-bug"></i> Panneau de test</summary>
        <div class="debug-section">
            <h4>Actions</h4>
            <div class="debug-buttons">
                <button class="btn-debug" onclick="debugWs('get_state')">get_state</button>
                <button class="btn-debug" onclick="debugWs('reset')">reset</button>
                <button class="btn-debug" onclick="debugWs('next_phase')">next_phase</button>
                <button class="btn-debug" onclick="debugWs('begin_vote')">begin_vote</button>
                <button class="btn-debug" onclick="debugWs('resolve_votes')">resolve_votes</button>
            </div>
        </div>
        <div class="debug-section">
            <h4>Elimination</h4>
            <div class="debug-buttons" id="elim-buttons"></div>
        </div>
        <div class="debug-section">
            <h4>Log</h4>
            <div id="log-area" class="log-area"></div>
        </div>
    </details>

    <script>
        var gameWindow = null;
        var ws = null;
        var lastState = null;

        function initWs() {
            ws = new WebSocket(`${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}/loup_garou/ws`);
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'state') {
                    lastState = data.data;
                    updateDebugButtons();
                }
                logMsg(JSON.stringify(data), data.type === 'error' ? 'err' : 'info');
            };
            ws.onopen = () => {
                ws.send(JSON.stringify({ type: 'get_state' }));
            };
        }

        function debugWs(action, data) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: action, ...(data || {}) }));
            }
        }

        function updateDebugButtons() {
            const elimDiv = document.getElementById('elim-buttons');
            if (!lastState || !lastState.players) {
                elimDiv.innerHTML = '';
                return;
            }
            const alive = lastState.players.filter(p => p.alive !== false);
            const nonWolf = alive.filter(p => p.role !== 'werewolf');
            elimDiv.innerHTML = '<span style="color:#8b8b9e;font-size:11px;">Eliminer:</span> ' +
                alive.map(p =>
                    `<button class="btn-debug danger" onclick="debugWs('eliminate_player', {player_id:'${p.id}',cause:'village_vote'})">${p.name}</button>`
                ).join('') +
                '<br><span style="color:#8b8b9e;font-size:11px;margin-top:6px;display:inline-block;">Loup:</span> ' +
                nonWolf.map(p =>
                    `<button class="btn-debug" onclick="debugWs('night_action', {action_type:'wolf_kill',target_id:'${p.id}'})">Tuer ${p.name}</button>`
                ).join('') +
                '<br><span style="color:#8b8b9e;font-size:11px;margin-top:6px;display:inline-block;">Voyante:</span> ' +
                alive.map(p =>
                    `<button class="btn-debug" onclick="debugWs('night_action', {action_type:'seer_investigate',target_id:'${p.id}'})">Observer ${p.name}</button>`
                ).join('');
        }

        function logMsg(msg, type) {
            const area = document.getElementById('log-area');
            const ts = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const div = document.createElement('div');
            div.className = `log-entry ${type || ''}`;
            div.textContent = `[${ts}] ${msg}`;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        }

        initWs();

        function openLoupGarou() {
            var adminUrl = window.location.origin + '/loup_garou/index.html';

            var isWebView = /HomeAssistant|wv|WebView/i.test(navigator.userAgent);

            if (isWebView) {
                window.location.href = adminUrl;
                return;
            }

            if (gameWindow && !gameWindow.closed) {
                gameWindow.focus();
                updateUI('focused');
                return;
            }

            var messageEl = document.getElementById('message');
            messageEl.classList.add('opening');

            gameWindow = window.open(adminUrl, 'loup_garou_game', 'noopener');

            if (gameWindow) {
                updateUI('opened');
            } else {
                window.location.href = adminUrl;
            }
        }

        function updateUI(state) {
            var messageEl = document.getElementById('message');
            var hintEl = document.getElementById('hint');
            var btnEl = document.getElementById('openBtn');
            messageEl.classList.remove('opening');

            if (state === 'opened') {
                messageEl.textContent = 'La partie est lancee dans un nouvel onglet!';
                hintEl.textContent = 'Cliquez a nouveau pour refocuser la fenetre';
                btnEl.querySelector('span:last-child').textContent = 'Refocuser';
            } else if (state === 'focused') {
                messageEl.textContent = 'Retour a la fenetre de jeu!';
            }
        }
    </script>
</body>
</html>
