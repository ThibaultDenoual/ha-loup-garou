[pytest]
asyncio_mode = strict
testpaths = tests/e2e
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::pytest.PytestRemovedIn9Warning
pythonpath = . custom_components custom_components/loup_garou custom_components/loup_garou/core_game

[playwright]
browser = chromium
headed = false
screenshot = only-on-failure
traces_dir = .playwright-traces
timeout = 15000